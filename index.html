<!DOCTYPE html>
<html>
<head>
  <title>GITARTHA – Bhagavad Gita Project</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .container {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 250px;
      background-color: #f0f0f0;
      padding: 20px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      overflow-y: auto;
    }
    .sidebar h2 {
      text-align: center;
      color: darkblue;
      margin-bottom: 20px;
    }
    .sidebar a {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      background-color: royalblue;
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 5px;
      font-size: 16px;
    }
    .sidebar a:hover {
      background-color: #003d99;
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      padding: 10px;
      background-color: darkblue;
      color: white;
      text-align: center;
      font-size: 20px;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>🕉️श्रीमद्भगवद्गीता🕉️</h2>
    <input type="text" id="search" placeholder="Search Chapter..." onkeyup="searchChapters()" style="width:100%; padding:8px; margin-bottom:10px;">

</div>
  <script>
    function searchChapters()
    {
      let input = document.getElementById("search").value.toLowerCase();
      let links = document.querySelectorAll(".sidebar a");
      links.forEach(function(link) {
        if
          (link.textContent.toLowerCase().includes(input)) {
            link.style.display ="block";
          }
        else {
          link.style.display="none";
        }
      });
    }
  </script>
