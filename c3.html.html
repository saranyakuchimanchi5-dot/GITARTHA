<p>📘The Path Of Selfless Action<br>
<h3>💫Sloka of Karma  Yoga<br></h3><p style="color:green; font-size:20px">श्रीभगवानुवाच —<br>
तस्मादसक्तः सततं कर्म समाचर।<br>
असक्तो ह्याचरन्कर्म परमाप्नोति पुरुषः॥<br>
</p>
<h3>🌿Moral of KarmaYoga<br></h3>

<p>Do your duty without expecting rewards.<br>
Selfless action leads to spiritual success and inner peace.<br></p>
